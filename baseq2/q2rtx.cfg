
bind w "+forward"
bind a "+moveleft"
bind s "+back"
bind d "+moveright"

bind f "use flare gun"

bind z "invprev"
bind x "invnext"
bind e "invuse"
bind v "inven"

bind / "next_sun"

bind TAB "score"
bind CTRL "+movedown"

bind MWHEELUP "weapnext"
bind MWHEELDOWN "weapprev"

bind F1 "help"
bind F2 "pushmenu savegame"
bind F3 "pushmenu loadgame"
bind F4 "pushmenu options"
bind F5 "pushmenu video"
bind F6 "save quick"
bind F7 "pushmenu sound"
bind F8 "pushmenu players"
bind F9 "load quick"
bind F10 "pushmenu quit"
bind F11 "pushmenu photomode"
bind F12 "screenshot"

seta cl_run "1"
seta freelook "1"
seta con_scale "2"

// Android defaults
set vid_fullscreen 1
set vid_rtx 1
set cl_maxfps 60
set r_maxfps 60
set drs_enable 1
set drs_target 30
set drs_minscale 10
set drs_maxscale 100
set flt_fsr_enable 0
set flt_fsr_easu 1
set flt_fsr_rcas 1
set flt_fsr_sharpness 0.15
set gr_enable 0
set pt_caustics 1
set bloom_enable 0
set pt_num_bounce_rays 0.5
set pt_texture_lod_bias 2
set scr_scale 1
set cl_cinematics 0
set sv_cinematics 0
set android_touch_controls 1
set profiler 1
set flt_enable 1
set pt_direct_sun_light 1
set pt_reflect_refract 1
seta ray_tracing_api "query"
alias whereami "echo $cl_viewpos $cl_viewdir"
